<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏生的庭園 | Hsia Sheng's Garden</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  :root {
    --ink: #1a1612; --paper: #f5f0e8; --gold: #b8956a; --mist: #8a8278; --crimson: #8a1515; --line: rgba(26,22,18,0.12);
  }
  body { background: var(--paper); color: var(--ink); font-family: 'Cormorant Garamond', serif; margin: 0; line-height: 1.8; }
  
  /* 語言切換隱藏邏輯 */
  body:not([data-lang="zh"]) .lang-zh { display: none !important; }
  body:not([data-lang="en"]) .lang-en { display: none !important; }
  body:not([data-lang="jp"]) .lang-jp { display: none !important; }
  body:not([data-lang="fr"]) .lang-fr { display: none !important; }

  /* 光箱樣式 */
  #lightbox { position: fixed; inset: 0; background: rgba(26,22,18,0.92); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(15px); cursor: zoom-out; }
  #lightbox img { max-width: 85%; max-height: 80vh; border: 1px solid var(--gold); box-shadow: 0 20px 60px rgba(0,0,0,0.6); }

  /* 導覽列與選單 */
  .lang-nav { position: fixed; top: 40px; right: 40px; z-index: 1000; display: flex; gap: 10px; }
  button { padding: 5px 15px; border: 1px solid var(--gold); background: transparent; cursor: pointer; color: var(--gold); transition: 0.3s; }
  button.active { background: var(--gold); color: var(--paper); }

  /* 佈局 */
  section { padding: 100px 80px; max-width: 1200px; margin: 0 auto; }
  .orbit-container { display: flex; flex-wrap: wrap; gap: 60px; align-items: center; }
  .orbit-sphere { position: relative; width: 460px; height: 460px; border-radius: 50%; border: 0.5px dashed var(--gold); }
  .orbit-node { position: absolute; width: 86px; height: 86px; border-radius: 50%; cursor: pointer; border: 3px solid var(--paper); box-shadow: 0 5px 15px rgba(0,0,0,0.2); transition: 0.4s; }
  .orbit-node:hover { transform: scale(1.1); }
  .orbit-node img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
  .orbit-panel { flex: 1; padding: 40px; border: 0.5px solid var(--line); }
</style>
</head>
<body data-lang="zh">

<nav class="lang-nav">
  <button onclick="setLang('zh')" class="btn-zh active">中</button>
  <button onclick="setLang('en')" class="btn-en">EN</button>
  <button onclick="setLang('jp')" class="btn-jp">日</button>
  <button onclick="setLang('fr')" class="btn-fr">FR</button>
</nav>

<!-- 光箱 -->
<div id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img" src="" alt="甜點細節攝影">
</div>

<section>
  <div class="orbit-container">
    <div class="orbit-sphere">
      <!-- 點擊觸發：更新面板並開啟大圖 -->
      <div class="orbit-node" style="left: 50%; top: 0%;" onclick="showDessert('ophelie-8.jpg', '奧菲莉亞的沉溺', 'Ophélie\'s Submersion', 'オフェリアの沈溺', 'La Submersion d\'Ophélie')">
        <img src="ophelie-8.jpg" alt="Dessert">
      </div>
    </div>
    
    <div class="orbit-panel">
      <h2 id="panel-title" class="lang-zh">點擊星軌節點</h2>
      <h2 id="panel-title" class="lang-en">Select a node</h2>
      <h2 id="panel-title" class="lang-jp">ノードを選択</h2>
      <h2 id="panel-title" class="lang-fr">Sélectionnez un nœud</h2>
      <p>攝影細節將在此處與光箱中同步展示。</p>
    </div>
  </div>
</section>

<script>
function setLang(lang) {
  document.body.setAttribute('data-lang', lang);
  document.querySelectorAll('.lang-nav button').forEach(btn => btn.classList.remove('active'));
  document.querySelector('.btn-' + lang).classList.add('active');
}

function showDessert(imgSrc, zh, en, jp, fr) {
  // 1. 開啟光箱
  document.getElementById('lightbox-img').src = imgSrc;
  document.getElementById('lightbox').style.display = 'flex';
  
  // 2. 更新面板文字
  const panel = document.getElementById('panel-title');
  // 這裡僅示範 title，實際部署建議擴充為完整的描述欄位物件
  panel.innerHTML = `<span class="lang-zh">${zh}</span><span class="lang-en">${en}</span><span class="lang-jp">${jp}</span><span class="lang-fr">${fr}</span>`;
  
  gsap.fromTo(".orbit-panel", {opacity: 0.5}, {opacity: 1, duration: 0.5});
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
}
</script>

</body>
</html>
